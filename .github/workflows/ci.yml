name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @travel-journal/shared build
      - run: pnpm lint

  unit:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @travel-journal/shared build
      - run: pnpm test

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build .

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit]
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
      minio:
        image: minio/minio
        command: server /data --console-address ":9001"
        ports:
          - 9100:9000
          - 9101:9001
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @travel-journal/shared build
      - run: pnpm --filter @travel-journal/server build
      - run: pnpm --filter @travel-journal/client build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          MONGODB_URI: mongodb://localhost:27017/travel-journal-test
          S3_ENDPOINT: http://localhost:9100
          S3_BUCKET: travel-journal
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          JWT_SECRET: ci-test-secret
          ADMIN_EMAIL: admin@localhost
